<!doctype html>
<html lang="en" style="overflow-x:hidden;scrollbar-width:none;-ms-overflow-style:none;">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/jpeg" href="https://qtrypzzcjebvfcihiynt.supabase.co/storage/v1/object/public/base44-prod/public/694b637358644e1c22c8ec6b/b128c437a_Untitleddesign-7.jpg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0d2360" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="CoStride" />
    <meta name="description" content="Train together. Track progress. Compete with friends." />
    <link rel="manifest" href="/manifest.json" />
    <title>CoStride</title>
    <!-- OneSignal SDK -->
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script>
      // ─── OneSignal Single Init (no double-init with React component) ───────
      // CRITICAL: Only init once here. The React OneSignalInit component
      // only handles user login — it does NOT call OneSignal.init() again.
      
      window.OneSignalDeferred = window.OneSignalDeferred || [];
      
      OneSignalDeferred.push(async function(OneSignal) {
        try {
          await OneSignal.init({
            appId: "9b5b68c2-c473-49eb-b74e-eac55368db3b",
            serviceWorkerPath: "/OneSignalSDKWorker.js",
            serviceWorkerUpdateStrategy: "auto",
            notifyButton: { enable: false },
          });
          
          console.log("[OneSignal] Initialized");
          console.log("[OneSignal] navigator.standalone =", navigator.standalone);
          console.log("[OneSignal] userAgent =", navigator.userAgent);
          
          const isPushEnabled = await OneSignal.Notifications.isPushNotificationsEnabled();
          const userId = await OneSignal.getUserId();
          console.log("[OneSignal] isPushNotificationsEnabled =", isPushEnabled);
          console.log("[OneSignal] userId =", userId);
          
          if (!userId) {
            console.warn("[OneSignal] userId is null — user not yet subscribed");
          }

          // Listen for permission changes
          OneSignal.Notifications.addEventListener("permission_change", async function(change) {
            if (change.permission === "granted") {
              const newUserId = await OneSignal.getUserId();
              console.log("[OneSignal] Permission granted. userId =", newUserId);
              window.dispatchEvent(new CustomEvent("onesignalPermissionGranted"));
            }
          });

          // Expose a prompt function for the "Enable Notifications" button
          window._OneSignalShowPrompt = async function() {
            const isEnabled = await OneSignal.Notifications.isPushNotificationsEnabled();
            if (isEnabled) {
              console.log("[OneSignal] Already subscribed, skipping prompt");
              return;
            }
            console.log("[OneSignal] Requesting permission...");
            await OneSignal.Notifications.requestPermission();
          };

        } catch (err) {
          console.error("[OneSignal] Init error:", err);
        }
      });
    </script>
  </head>
  <body style="overflow-x:hidden;scrollbar-width:none;-ms-overflow-style:none;">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
