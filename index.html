                    actionMessage: 'Stay connected with your gym community — enable notifications.',
                    acceptButton: 'Allow',
                    cancelButton: 'Not now',
                  },
                },
              ],
            },
          },
          notifyButton: { enable: false },
          allowLocalhostAsSecureOrigin: true,
        });
      });
