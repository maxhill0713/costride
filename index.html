<!doctype html>
<html lang="en" style="overflow-x:hidden;scrollbar-width:none;-ms-overflow-style:none;">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/jpeg" href="https://qtrypzzcjebvfcihiynt.supabase.co/storage/v1/object/public/base44-prod/public/694b637358644e1c22c8ec6b/b128c437a_Untitleddesign-7.jpg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0d2360" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="CoStride" />
    <meta name="description" content="Train together. Track progress. Compete with friends." />
    <link rel="manifest" href="/manifest.json" />
    <title>CoStride</title>
    <!-- OneSignal SDK -->
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script>
      // ─── OneSignal iOS Web Push Diagnostics & Setup ───
      // Status: Working on desktop/web, troubleshooting iOS PWA
      
      let isOneSignalInitialized = false;
      window._OneSignalPromptShown = false;
      
      function logDiagnostics() {
        console.log("=== OneSignal Diagnostics ===");
        console.log("Platform: iOS Web Push Issue Detected");
        console.log("Status: Working on desktop, NOT working on iOS home screen");
        console.log("Root Cause: iOS PWA-specific configuration");
        console.log("Fix: Service workers must be at /root, manifest.json must have 'standalone'");
        console.log("navigator.standalone:", navigator.standalone);
        console.log("navigator.userAgent:", navigator.userAgent);
      }
      
      function initializeOneSignal() {
        if (isOneSignalInitialized) {
          console.warn("OneSignal: already initialized, skipping duplicate init");
          return;
        }
        
        window.OneSignalDeferred = window.OneSignalDeferred || [];
        OneSignalDeferred.push(async function(OneSignal) {
          try {
            // Initialize OneSignal
            await OneSignal.init({
              appId: "9b5b68c2-c473-49eb-b74e-eac55368db3b",
              serviceWorkerPath: "/OneSignalSDKWorker.js",
              serviceWorkerUpdateStrategy: "auto",
              notifyButton: { enable: false },
            });
            
            isOneSignalInitialized = true;
            console.log("OneSignal: initialized successfully");
            
            // iOS Debug Logging
            const isPushEnabled = await OneSignal.Notifications.isPushNotificationsEnabled();
            const userId = await OneSignal.getUserId();
            console.log("OneSignal: isPushNotificationsEnabled =", isPushEnabled);
            console.log("OneSignal: userId =", userId);
            console.log("OneSignal: navigator.standalone =", navigator.standalone);
            
            if (!userId) {
              console.warn("OneSignal: user ID is null - subscription failed or not yet granted");
            }
            
            // Listen for permission changes
            OneSignal.Notifications.addEventListener("permission_change", async (change) => {
              if (change.permission === "granted") {
                const newUserId = await OneSignal.getUserId();
                console.log("OneSignal: permission granted, new userId =", newUserId);
                if (newUserId) {
                  console.log("✓ User successfully registered in OneSignal dashboard");
                }
                window.dispatchEvent(new CustomEvent('onesignalPermissionGranted'));
              }
            });
            
            // Make showPrompt function globally available
            window._OneSignalShowPrompt = async () => {
              if (window._OneSignalPromptShown) {
                console.log("OneSignal: prompt already shown, skipping");
                return;
              }
              
              const isEnabled = await OneSignal.Notifications.isPushNotificationsEnabled();
              if (isEnabled) {
                console.log("OneSignal: notifications already enabled, skipping prompt");
                return;
              }
              
              try {
                window._OneSignalPromptShown = true;
                console.log("OneSignal: showing prompt");
                await OneSignal.Notifications.requestPermission();
              } catch (err) {
                console.error("OneSignal: failed to show prompt", err);
                window._OneSignalPromptShown = false;
              }
            };
            
            logDiagnostics();
          } catch (err) {
            console.error("OneSignal: initialization error", err);
          }
        });
      }
      
      // Initialize on DOMContentLoaded
      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", initializeOneSignal);
      } else {
        initializeOneSignal();
      }
    </script>
  </head>
  <body style="overflow-x:hidden;scrollbar-width:none;-ms-overflow-style:none;">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
